  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

      flex-direction: column;
      align-items: center;
      padding: 20px 0 40px;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;

      gap: 10px;

      padding: 16px;

      text-decoration: none;

      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 10px rgba(0,64,96,0.3);
      transition: background 0.2s;
    }
    .map-btn:active { background: #002a40; }
    .map-icon {
      font-size: 20px;
    }
    .addr-text {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }
  </style>
